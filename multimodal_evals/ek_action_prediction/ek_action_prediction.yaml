seed: 0
num_epochs: 5
log_interval: 10
val_interval: 1
use_bfloat16: true

model:
  checkpoint: /data/vjepa2/checkpoints/checkpoint_epoch_100.pt
  v_encoder:
    checkpoint_path: /data/vjepa2/vjepa2_1_vitb_dist_vitG_384.pt
    img_size: 384
    patch_size: 16
    tubelet_size: 2
    num_frames: 32
    embed_dim: 768
    freeze: true
  l_encoder:
    model_name: "google/siglip-large-patch16-384"
    max_length: 64
    embed_dim: 1024
    freeze: true
    local_files_only: false
  projectors:
    shared_dim: 512
    hidden_dim: 1024
  predictor:
    predictor_dim: 384
    depth: 12
    num_heads: 8

classifier:
  num_blocks: 2
  num_heads: 16

optimization:
  lr: 0.001
  weight_decay: 0.05

data:
  jsonl_path: /data/eku/vjepa_state_transitions.jsonl
  val_split: 0.1
  split_seed: 0
  img_size: 384
  batch_size: 4
  num_workers: 2
  pin_memory: true
  persistent_workers: false
  strict_frames: true
